# .github/workflows/daily_value_report.yml
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions Workflow
# Runs the daily value-investing report every weekday at 07:00 KST (22:00 UTC)
#
# ── REQUIRED SECRETS (Settings → Secrets → Actions) ──────────────────────────
#   SENDER_EMAIL      → Gmail address used to SEND the report
#   SENDER_PASSWORD   → Gmail App Password (NOT your Google account password)
#                       How to generate: Google Account → Security
#                                        → 2-Step Verification → App passwords
#   RECIPIENT_EMAIL   → Address where the report should be DELIVERED
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Value Investing Report

on:
  # ── Scheduled trigger ── 22:00 UTC = 07:00 KST (next day)
  schedule:
    - cron: "0 22 * * 1-5"          # Monday–Friday only (market days)

  # ── Allow manual runs from the Actions tab ──
  workflow_dispatch:

jobs:
  run-report:
    name: Generate & Mail Value Report
    runs-on: ubuntu-latest
    timeout-minutes: 15              # Safety cap — yfinance calls can be slow

    steps:
      # ── 1. Check out repository ──────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"               # Cache pip deps for faster reruns

      # ── 3. Install dependencies ──────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. Run the report script ──────────────────────────────────────────
      #    Secrets are injected as environment variables — never hard-coded.
      - name: Run daily_value_report.py
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SMTP_HOST:       smtp.gmail.com
          SMTP_PORT:       "587"
        run: |
          python daily_value_report.py

      # ── 5. Upload the HTML report as an artifact (30-day retention) ───────
      #    Useful for inspecting the output without opening e-mail.
      - name: Upload HTML report artifact
        if: always()                 # Upload even if mail delivery fails
        uses: actions/upload-artifact@v4
        with:
          name: value-report-${{ github.run_id }}
          path: "report_*.html"
          retention-days: 30

